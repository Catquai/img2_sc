interface:
  display_name: "img2-sc-frame"
  short_description: "帧动画图片资源精确改色；保护白色前景，并单独控制扫光清晰度。"
  default_prompt: "使用 $img2-sc-frame 对帧动画 PNG 序列、GIF 拆帧或精灵图条做目标色改色。用户只提供图片且没有文本描述时，直接随机改主要主题色，不要追问。青色、绿色、橙黄色、黄色要适当降低主体明度，确保白色字体或图形叠加时仍清晰。扫光必须分层单独处理，保持明显、干净、同系偏亮，不得发灰、发脏、发泥或被主体色吞掉。必须保持尺寸、帧顺序、透明度、运动轨迹、构图、阴影、高光和逐帧差异不变。"
