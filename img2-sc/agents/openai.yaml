interface:
  display_name: "img2-sc-all"
  short_description: "将文本、参考图、组合资源、帧动画资源或参考图+文本转成 JSON，用 gpt-image-2 生成图像并按需输出透明 PNG。"
  default_prompt: "使用 $img2-sc-all 判定输入模式：纯文本时将文本描述提炼为结构化 JSON；只提供参考图时必须自动提炼参考图 JSON 并直接生成语义一致但不雷同的新变体，不要停在分析、不要询问是否生成、不要列出处理选项或反复提问；横向/纵向组合资源或 sprite strip 必须识别整体透明画布、每个子图块的真实像素尺寸、正方形或非正方形圆角矩形形状、圆角、透明间距、徽标叠加和逐块不变性；必须检测参考图全透明区域和半透明区域并写入 transparency_analysis；半透明叠层图标必须区分 PNG 背景透明和内部半透明形状，记录各图层 alpha、层级和遮挡关系，禁止把半透明区域生成成实色填充；多张同尺寸参考图疑似帧动画资源时，识别静态底图、运动元素、帧序号、位移轨迹和跨帧不变性；参考图+文本时从文本中抽取风格、色彩、外形、主体、尺寸、透明要求并合并/替换到参考图 JSON。随后调用 image_generation 工具并指定 gpt-image-2 生成新图；如果需要透明 PNG，先本地去绿幕输出真实透明 PNG，再按明确目标尺寸缩放。"
